name: Feature request
description: Propose a focused improvement to Meme Search
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem or workflow
      description: What are you trying to do, and where does the current experience fall short?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed improvement
      description: Describe the smallest useful version of the change.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Include workarounds or related tools you have tried.
  - type: dropdown
    id: contribution
    attributes:
      label: Would you be interested in contributing this?
      options:
        - "Yes"
        - "Maybe, with guidance"
        - "No"
  - type: checkboxes
    id: checks
    attributes:
      label: Checklist
      options:
        - label: I searched existing issues and discussions.
          required: true
