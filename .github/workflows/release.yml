# Release workflow - triggers on version tags
# Creates versioned GHCR image tags from the refreshed latest manifests and publishes a GitHub release.
name: "Release"

on:
  push:
    tags:
      - 'v*'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # Create GitHub Release
  create-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Get version from tag
        id: get_version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Verify VERSION file matches tag
        run: |
          FILE_VERSION=$(cat VERSION | tr -d '[:space:]')
          TAG_VERSION="${GITHUB_REF#refs/tags/v}"
          if [ "$FILE_VERSION" != "$TAG_VERSION" ]; then
            echo "ERROR: VERSION file ($FILE_VERSION) does not match tag ($TAG_VERSION)"
            exit 1
          fi
          echo "Version verified: $TAG_VERSION"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create versioned Docker image tags
        run: |
          docker buildx imagetools create \
            ghcr.io/neonwatty/meme_search:latest \
            --tag ghcr.io/neonwatty/meme_search:v${{ steps.get_version.outputs.version }}
          docker buildx imagetools create \
            ghcr.io/neonwatty/image_to_text_generator:latest \
            --tag ghcr.io/neonwatty/image_to_text_generator:v${{ steps.get_version.outputs.version }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          name: Release v${{ steps.get_version.outputs.version }}
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref, '-alpha') || contains(github.ref, '-beta') || contains(github.ref, '-rc') }}
          body: |
            ## Highlights

            - Added OpenAI-compatible vision description provider support, originally contributed by @SirEdvin in #153.
            - Added app-wide model provider settings for choosing local or OpenAI-compatible cloud generation.
            - Made image description generation durable through Solid Queue so failed attempts can be retried cleanly.
            - Added E2E and integration coverage, plus an optional live OpenAI smoke workflow gated by `OPENAI_API_KEY`.
            - Fixed and rebuilt multi-arch Docker image publishing for AMD64 and ARM64.

            ## Contributor Thanks

            Thanks to @SirEdvin for kicking off this release with the original OpenAI-compatible provider contribution in #153. The release was expanded through follow-up PRs to cover provider selection UX, queue durability, live smoke testing, and Docker image publishing fixes.

            ## Docker Images

            Multi-arch images are available for Linux AMD64 and ARM64:

            - `ghcr.io/neonwatty/meme_search:v${{ steps.get_version.outputs.version }}`
            - `ghcr.io/neonwatty/image_to_text_generator:v${{ steps.get_version.outputs.version }}`

            The `latest` tags have also been refreshed.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
