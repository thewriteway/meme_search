name: Docker Compose persistence tests

on:
  workflow_dispatch:
  pull_request:
    branches: ["main", "develop"]
    paths:
      - ".gitignore"
      - "docker-compose*.yml"
      - "scripts/test_compose_persistence_paths.sh"
      - ".github/workflows/docker-compose-persistence-test.yml"
      - "README.md"
  push:
    branches: ["main", "develop"]
    paths:
      - ".gitignore"
      - "docker-compose*.yml"
      - "scripts/test_compose_persistence_paths.sh"
      - ".github/workflows/docker-compose-persistence-test.yml"
      - "README.md"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  docker_compose_persistence:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Validate Compose persistence paths
        run: bash scripts/test_compose_persistence_paths.sh
